# Déploiement Render — monorepo (racine = dossier guestbook)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: guestbook-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:api
    startCommand: npm run start --workspace=@guestbook/backend
    envVars:
      - key: NODE_ENV
        value: production
